<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!-- 
      target-densitydpi=device-dpi : forces WebView to use 1:1 physical pixel mapping
      On 2400×1080 screen this gives exactly 2400 CSS pixels width 
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, target-densitydpi=device-dpi, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Fukuoka Airport Information Board</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        position: fixed;
        top: 0;
        left: 0;
      }
      body {
        font-family: 'Courier New', 'MS Gothic', monospace;
        /* Prevent any browser default zoom/scale behavior */
        touch-action: none;
        -webkit-text-size-adjust: none;
        text-size-adjust: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
